name: Build macOS .app

on:
  push:
    branches: [main, mvp-finder, feat/rover-final]
    tags: ['v*']
  workflow_dispatch:

# One concurrent build per branch. Newer push cancels older runs.
concurrency:
  group: build-mac-${{ github.ref }}
  cancel-in-progress: true

# softprops/action-gh-release needs write access to the Releases API.
permissions:
  contents: write

jobs:
  build-mac:
    name: .app + .dmg (Apple Silicon)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust stable (aarch64-apple-darwin)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo target dir
        uses: actions/cache@v4
        with:
          path: src-tauri/target/
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      # The .app does NOT bundle a Python venv — tauri.conf.json only ships
      # the backend/*.py source files + requirements.txt. On first launch,
      # the Rust shell creates a fresh venv in
      # ~/Library/Application Support/app.houston.demo/backend/.venv using the
      # user's system python3, then pip-installs the deps. This makes the
      # .app fully portable: any Mac with Python 3 + Ollama installed will
      # work, no path-dependent venv baggage.

      - name: Install Node deps
        run: npm ci

      - name: Build Tauri (.app + .dmg)
        run: npm run tauri build -- --bundles app,dmg
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          CI: true

      # Belt-and-braces ad-hoc re-sign. tauri.conf.json macOS.signingIdentity
      # is set to "-" so the bundler should already ad-hoc sign, but Tauri 2's
      # bundle pipeline copies resources AFTER the inner binary is signed.
      # Re-running codesign with --deep --force on the finished .app catches
      # any embedded helpers/frameworks that slipped through the first pass.
      # This stops Gatekeeper's "Houston is damaged and can't be opened"
      # message on Apple Silicon — quarantined apps still need right-click ->
      # Open the first time, but they no longer fail outright.
      - name: Ad-hoc re-sign the .app bundle
        run: |
          APP=src-tauri/target/release/bundle/macos/Houston.app
          codesign --deep --force --sign - --timestamp=none "$APP"
          codesign --verify --verbose=2 "$APP" || true
          echo "--- spctl assess (will likely fail because we're ad-hoc, that's fine) ---"
          spctl --assess --type execute --verbose=4 "$APP" 2>&1 || true

      - name: Zip the .app for upload
        run: |
          cd src-tauri/target/release/bundle/macos
          zip -ryq Houston.app.zip Houston.app
          ls -lh Houston.app.zip

      - name: Upload Houston.app (zipped)
        uses: actions/upload-artifact@v4
        with:
          name: Houston-app-${{ github.sha }}
          path: src-tauri/target/release/bundle/macos/Houston.app.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload Houston.dmg
        uses: actions/upload-artifact@v4
        with:
          name: Houston-dmg-${{ github.sha }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30

      # On tag push (v*), publish a GitHub Release that pinpoints the
      # .app.zip + .dmg as downloadable assets — no login required, no
      # 30-day retention timer.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/macos/Houston.app.zip
            src-tauri/target/release/bundle/dmg/*.dmg
          generate_release_notes: true
          body: |
            ## Houston · macOS download

            > **⚠️  If macOS says "Houston is damaged and can't be opened":**
            > That's Gatekeeper, not a corrupt download. Houston is
            > **ad-hoc signed but not notarized** (no Apple Developer
            > Program for a hackathon demo). Strip the quarantine xattr
            > that Safari/Chrome added and you're good:
            >
            > ```bash
            > xattr -cr /Applications/Houston.app
            > ```
            >
            > Then double-click as normal. Do this **once** per install.

            **Install:**
            1. Download `Houston_*.dmg` below.
            2. Open it, drag **Houston** into `/Applications`.
            3. First launch — pick whichever applies:
               - **Best path**: terminal → `xattr -cr /Applications/Houston.app`
                 → double-click. No prompts.
               - **GUI path**: right-click Houston → **Open** → **Open**
                 in the dialog. (May still say "damaged" on Sonoma+; if
                 so, fall back to the xattr command.)
            4. Make sure Ollama is running with the models we use:
               ```bash
               brew install ollama && ollama serve
               ollama pull gemma3:4b nomic-embed-text
               ```
               Or for vision (image describe):
               ```bash
               ollama pull gemma4:latest
               ```
            5. Open Houston → click **Mars Habitat** in the sidebar to
               see the on-device demo corpus, or pick any folder.

            See [README.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md)
            for the full feature list + measured benchmarks, and
            [docs/diagrams/](https://github.com/${{ github.repository }}/tree/${{ github.ref_name }}/docs/diagrams)
            for the architecture write-up.

      - name: Build summary
        if: always()
        run: |
          {
            echo "## Build outputs"
            echo
            ls -lh src-tauri/target/release/bundle/macos/ 2>/dev/null || true
            ls -lh src-tauri/target/release/bundle/dmg/   2>/dev/null || true
            echo
            echo "Artifacts uploaded:"
            echo "- **Houston-app-${{ github.sha }}** (zipped Houston.app)"
            echo "- **Houston-dmg-${{ github.sha }}** (Houston_*.dmg)"
            echo
            echo "## How to install"
            echo
            echo "1. Download the artifact below (click → unzip / mount the .dmg)."
            echo "2. Drag Houston.app to /Applications (or anywhere)."
            echo "3. **If macOS says 'Houston is damaged and can't be opened':**"
            echo "   That's Gatekeeper hitting the quarantine flag on an ad-hoc"
            echo "   signed (not notarized) build. Strip it once:"
            echo "   \`\`\`bash"
            echo "   xattr -cr /Applications/Houston.app"
            echo "   \`\`\`"
            echo "   Then double-click. Subsequent launches work normally."
            echo "4. Houston will auto-create its Python venv on first launch (~1 min,"
            echo "   ~150 MB) inside ~/Library/Application Support/app.houston.demo/."
            echo "5. Have **Ollama** running with at least 'gemma4:latest' or another"
            echo "   chat model + 'nomic-embed-text' pulled."
          } >> "$GITHUB_STEP_SUMMARY"
